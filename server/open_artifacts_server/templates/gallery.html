<!doctype html>
<html lang="en">

    <title>Open Artifacts Gallery</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>

    <header class="topbar">
      <a class="brand" href="/gallery">Open Artifacts</a>

    </main>
    <script src="/static/app.js"></script>

</html>
