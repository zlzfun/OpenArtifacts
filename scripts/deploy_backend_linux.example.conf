# Template for scripts/deploy_backend_linux.conf.
# Edit scripts/deploy_backend_linux.conf, then run:
#   ./scripts/deploy_backend_linux.sh

# PM2 process name.
PM2_APP_NAME="open-artifacts-backend"

# FastAPI listens only on localhost; nginx exposes it publicly.
APP_HOST="127.0.0.1"
APP_PORT="8787"

# IP-only deployment:
#   Prefer setting NGINX_SERVER_NAME to the actual server IP. This avoids nginx
#   routing requests to another default server when multiple backends share
#   the same machine.
#   Set PUBLIC_BASE_URL to "http://YOUR_SERVER_IP" after replacing the IP.
#
# Domain deployment:
#   Set NGINX_SERVER_NAME="artifacts.example.com"
#   Set PUBLIC_BASE_URL="https://artifacts.example.com" if TLS terminates here
#   or "http://artifacts.example.com" for plain HTTP.
NGINX_SERVER_NAME="_"
PUBLIC_BASE_URL=""

# If another backend already owns IP:80, use a distinct listen port here and
# include it in PUBLIC_BASE_URL, for example http://YOUR_SERVER_IP:8788.
NGINX_LISTEN_PORT="80"

# Optional nginx listen flags, for example "default_server".
# Only one site can be default_server for the same address:port.
NGINX_LISTEN_OPTIONS=""

# Leave empty to auto-generate a token on first deploy and persist it in
# .deploy/open-artifacts.env. Set a value here only if you want to control it.
OPEN_ARTIFACTS_PUBLISH_TOKEN=""

# Runtime data and generated deployment files.
OPEN_ARTIFACTS_DB=""
DEPLOY_DIR=""
DATA_DIR=""
VENV_DIR=".venv"

# Optional Python package index settings for uv pip install.
# Leave blank to use the server's existing pip/uv configuration.
UV_INDEX_URL=""
UV_EXTRA_INDEX_URL=""
UV_INSECURE_HOST=""

# nginx target config. The script validates and reloads nginx after writing it.
NGINX_CONF_PATH="/etc/nginx/conf.d/open-artifacts.conf"

# Set to 1 once if you want PM2 to install a systemd startup entry.
SETUP_PM2_STARTUP="0"

# Used only when pm2/npm are not already installed on the machine.
NODE_VERSION="22.11.0"
PM2_VERSION="latest"
